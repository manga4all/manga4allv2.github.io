<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-browser-title">Lector | M4A</title>
    <link rel="stylesheet" href="css/style.css?v=13">
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo">Manga 4 All</a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="directory.html">Directorio</a>
            </div>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Buscar manga...">
        </div>
    </nav>

    <div class="nav-controls">
        <a id="btn-back-manga-top" href="#" class="btn" style="background:#222">☰ Lista</a>
        <a id="prev-btn-top" href="#" class="btn">←</a>
        <span id="chapter-title-top" class="chapter-label">Cargando...</span>
        <a id="next-btn-top" href="#" class="btn">→</a>
    </div>

    <main id="reader-content" class="manga-container">
        </main>

    <div class="nav-controls" style="padding: 60px 0;">
        <a id="btn-back-manga-bottom" href="#" class="btn" style="background:#222">☰ Lista</a>
        <a id="prev-btn-bottom" href="#" class="btn">←</a>
        <span id="chapter-title-bottom" class="chapter-label">Cargando...</span>
        <a id="next-btn-bottom" href="#" class="btn">→</a>
    </div>

    <script type="module">
  import { db } from "./js/firebase.js";
  import { 
    doc, getDoc, collection, query, where, getDocs 
  } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const mangaId = params.get("manga");
  const currentNumber = params.get("number");

  const mangaPages = document.getElementById("mangaPages");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  async function loadReader() {
    if (!mangaId || !currentNumber) return;

    try {
      // 1. CARGAR IMÁGENES DEL CAPÍTULO ACTUAL
      const qCap = query(
        collection(db, "tomos"),
        where("mangaId", "==", mangaId),
        where("number", "==", currentNumber)
      );

      const querySnapshot = await getDocs(qCap);
      if (!querySnapshot.empty) {
        const tomoData = querySnapshot.docs[0].data();
        mangaPages.innerHTML = "";
        tomoData.images.forEach((url) => {
          mangaPages.innerHTML += `<img src="${url}" alt="Página">`;
        });
      }

      // 2. LÓGICA DE NAVEGACIÓN (BOTONES)
      const qAll = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
      const allCapsSnap = await getDocs(qAll);
      
      let allChapters = [];
      allCapsSnap.forEach(d => allChapters.push(d.data()));
      
      // Ordenar capítulos numéricamente
      allChapters.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));

      const currentIndex = allChapters.findIndex(c => c.number === currentNumber);

      // Configurar botón Anterior
      if (currentIndex > 0) {
        const prevNum = allChapters[currentIndex - 1].number;
        prevBtn.href = `reader.html?manga=${mangaId}&number=${prevNum}`;
      } else {
        prevBtn.style.opacity = "0.3";
        prevBtn.style.pointerEvents = "none";
        prevBtn.removeAttribute("href");
      }

      // Configurar botón Siguiente
      if (currentIndex < allChapters.length - 1) {
        const nextNum = allChapters[currentIndex + 1].number;
        nextBtn.href = `reader.html?manga=${mangaId}&number=${nextNum}`;
      } else {
        // AQUÍ ESTÁ EL FIX: Si es el último, deshabilitamos el botón
        nextBtn.style.opacity = "0.3";
        nextBtn.style.pointerEvents = "none";
        nextBtn.removeAttribute("href");
        nextBtn.innerText = "Fin del Manga"; // Opcional: Avisa al usuario
      }

    } catch (error) {
      console.error("Error en el reader:", error);
    }
  }

  loadReader();
</script>
    <script src="js/navbar.js"></script>
</body>
</html>
