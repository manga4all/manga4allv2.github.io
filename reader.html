<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-browser-title">Lector | M4A</title>
    <link rel="stylesheet" href="css/style.css?v=13">
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo">Manga 4 All</a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="directory.html">Directorio</a>
            </div>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Buscar manga...">
        </div>
    </nav>

    <div class="nav-controls">
        <a id="btn-back-manga-top" href="#" class="btn" style="background:#222">☰ Lista</a>
        <a id="prev-btn-top" href="#" class="btn">←</a>
        <span id="chapter-title-top" class="chapter-label">Cargando...</span>
        <a id="next-btn-top" href="#" class="btn">→</a>
    </div>

    <main id="reader-content" class="manga-container">
        </main>

    <div class="nav-controls" style="padding: 60px 0;">
        <a id="btn-back-manga-bottom" href="#" class="btn" style="background:#222">☰ Lista</a>
        <a id="prev-btn-bottom" href="#" class="btn">←</a>
        <span id="chapter-title-bottom" class="chapter-label">Cargando...</span>
        <a id="next-btn-bottom" href="#" class="btn">→</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { 
            getFirestore, collection, query, where, getDocs, doc, getDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCWh1P5pyM7nqscPdenQDEHHbSNTduVufo", 
            authDomain: "manga4all-f520f.firebaseapp.com", 
            projectId: "manga4all-f520f", 
            storageBucket: "manga4all-f520f.firebasestorage.app", 
            messagingSenderId: "372561836700", 
            appId: "1:372561836700:web:cbb295bda656abd2ea0b59" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadChapter() {
            const urlParams = new URLSearchParams(window.location.search);
            const mangaId = urlParams.get('manga');
            const chapterParam = urlParams.get('number');

            if (!mangaId || !chapterParam) return;

            const listUrl = `manga.html?id=${mangaId}`;
            document.getElementById('btn-back-manga-top').href = listUrl;
            document.getElementById('btn-back-manga-bottom').href = listUrl;

            try {
                const mangaRef = doc(db, "mangas", mangaId);
                const mangaSnap = await getDoc(mangaRef);
                const mangaName = mangaSnap.exists() ? mangaSnap.data().title : "Manga";

                let q = query(collection(db, "tomos"), where("mangaId", "==", mangaId), where("number", "==", String(chapterParam)));
                let querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty && !isNaN(chapterParam)) {
                    q = query(collection(db, "tomos"), where("mangaId", "==", mangaId), where("number", "==", Number(chapterParam)));
                    querySnapshot = await getDocs(q);
                }

                if (!querySnapshot.empty) {
                    const docData = querySnapshot.docs[0].data();
                    const cleanNumber = parseFloat(docData.number);
                    
                    const fullTitle = `Capítulo ${cleanNumber}`;
                    document.getElementById('chapter-title-top').innerText = fullTitle;
                    document.getElementById('chapter-title-bottom').innerText = fullTitle;
                    document.title = `${mangaName} ${fullTitle} | M4A`;

                    // --- GUARDAR PROGRESO (NUEVO) ---
                    const progress = {
                        mangaId: mangaId,
                        mangaTitle: mangaName,
                        mangaCover: mangaSnap.data().cover,
                        chapterNumber: chapterParam, 
                        displayNumber: cleanNumber   
                    };
                    localStorage.setItem('lastReadM4A', JSON.stringify(progress));

                    const content = document.getElementById('reader-content');
                    content.innerHTML = ""; 
                    docData.images.forEach(url => {
                        const img = document.createElement('img');
                        img.src = url;
                        img.loading = "lazy";
                        content.appendChild(img);
                    });

                    setupNavigation(mangaId, chapterParam);
                } else {
                    document.getElementById('reader-content').innerHTML = "<div style='text-align:center; padding:50px;'>El capítulo no existe.</div>";
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        async function setupNavigation(mangaId, currentNum) {
            const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
            const navSnapshot = await getDocs(q);
            let chapters = [];
            navSnapshot.forEach(doc => chapters.push(doc.data().number));
            chapters.sort((a, b) => parseFloat(a) - parseFloat(b));
            const currentIndex = chapters.findIndex(c => parseFloat(c) === parseFloat(currentNum));

            const prevBtns = [document.getElementById('prev-btn-top'), document.getElementById('prev-btn-bottom')];
            const nextBtns = [document.getElementById('next-btn-top'), document.getElementById('next-btn-bottom')];

            if (currentIndex > 0) {
                const prevUrl = `reader.html?manga=${mangaId}&number=${chapters[currentIndex - 1]}`;
                prevBtns.forEach(btn => { 
                    btn.href = prevUrl; 
                    btn.classList.remove('disabled'); 
                });
            } else {
                prevBtns.forEach(btn => { 
                    btn.href = "#"; 
                    btn.classList.add('disabled'); 
                });
            }

            if (currentIndex !== -1 && currentIndex < chapters.length - 1) {
                const nextUrl = `reader.html?manga=${mangaId}&number=${chapters[currentIndex + 1]}`;
                nextBtns.forEach(btn => { 
                    btn.href = nextUrl; 
                    btn.classList.remove('disabled'); 
                });
            } else {
                nextBtns.forEach(btn => { 
                    btn.href = "#"; 
                    btn.classList.add('disabled'); 
                });
            }
        }

        loadChapter();
    </script>
    <script src="js/navbar.js"></script>
</body>
</html>
