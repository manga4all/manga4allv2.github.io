<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lector | Manga 4 All</title>
  <link rel="stylesheet" href="css/style.css?v=18">
  <style>
    .reader-nav { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px; background: #111; position: sticky; top: 70px; z-index: 1000; }
    .btn-nav { background: #ff0055; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
    .btn-nav.disabled { background: #333; color: #777; pointer-events: none; opacity: 0.6; }
    #chapterLabelTop, #chapterLabelBottom { font-weight: bold; color: white; text-align: center; min-width: 130px; }
    .manga-pages-container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; }
    .manga-pages-container img { width: 100%; height: auto; display: block; background: #111; min-height: 200px; }
    .list-btn { background: #333; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
        <a href="index.html" class="logo">Manga 4 All</a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="directory.html">Directorio</a>
        </div>
    </div>
  </nav>

  <div class="reader-nav">
    <a href="#" id="listBtnTop" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnTop" class="btn-nav">←</a>
    <span id="chapterLabelTop">Cargando...</span>
    <a href="#" id="nextBtnTop" class="btn-nav">→</a>
  </div>

  <div class="manga-pages-container" id="mangaPages"></div>

  <div class="reader-nav" style="margin-bottom: 50px;">
    <a href="#" id="listBtnBottom" class="list-btn">☰ Lista</a>
    <a href="#" id="prevBtnBottom" class="btn-nav">←</a>
    <span id="chapterLabelBottom">Cargando...</span>
    <a href="#" id="nextBtnBottom" class="btn-nav">→</a>
  </div>

  <footer>Manga 4 All © 2026</footer>

  <script src="js/navbar.js"></script>

  <script type="module">
    import { db } from "./js/firebase.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("manga");
    const currentNumber = params.get("number");

    async function loadReader() {
      if (!mangaId || !currentNumber) return;

      // 1. Configurar botones de volver
      const listUrl = `manga.html?id=${mangaId}`;
      document.getElementById("listBtnTop").href = listUrl;
      document.getElementById("listBtnBottom").href = listUrl;
      document.getElementById("chapterLabelTop").textContent = `Capítulo ${currentNumber}`;
      document.getElementById("chapterLabelBottom").textContent = `Capítulo ${currentNumber}`;

      try {
        // 2. Traer TODOS los capítulos de este manga (Es más seguro)
        const q = query(collection(db, "tomos"), where("mangaId", "==", mangaId));
        const snap = await getDocs(q);
        
        let allChapters = [];
        snap.forEach(doc => allChapters.push(doc.data()));

        // Ordenar numéricamente
        allChapters.sort((a, b) => parseFloat(a.number) - parseFloat(b.number));

        // 3. Buscar el capítulo actual en la lista
        const tomoActual = allChapters.find(c => String(c.number) === String(currentNumber));

        if (tomoActual && tomoActual.images) {
          const container = document.getElementById("mangaPages");
          container.innerHTML = "";
          tomoActual.images.forEach(url => {
            const img = document.createElement("img");
            img.src = url;
            container.appendChild(img);
          });
        } else {
          document.getElementById("mangaPages").innerHTML = "<p style='text-align:center; padding:50px;'>No se encontraron imágenes para este capítulo.</p>";
        }

        // 4. Configurar navegación
        const currentIndex = allChapters.findIndex(c => String(c.number) === String(currentNumber));

        // Anterior
        setupBtn("prevBtnTop", "prevBtnBottom", currentIndex > 0 ? allChapters[currentIndex - 1].number : null);
        // Siguiente
        setupBtn("nextBtnTop", "nextBtnBottom", currentIndex < allChapters.length - 1 ? allChapters[currentIndex + 1].number : null);

      } catch (e) {
        console.error("Error:", e);
      }
    }

    function setupBtn(idT, idB, target) {
      const bT = document.getElementById(idT);
      const bB = document.getElementById(idB);
      if (target !== null) {
        const url = `reader.html?manga=${mangaId}&number=${target}`;
        bT.href = url; bB.href = url;
        bT.classList.remove("disabled"); bB.classList.remove("disabled");
      } else {
        bT.classList.add("disabled"); bB.classList.add("disabled");
        if(idT.includes("next")) bT.textContent = bB.textContent = "FIN";
      }
    }

    loadReader();
  </script>
</body>
</html>
